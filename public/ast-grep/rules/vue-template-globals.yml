id: vue-template-globals-text
language: Html
severity: warning
message: "Vue template uses a `$`-prefixed identifier inside {{ }}; bind it from <script setup> instead"
rule:
  kind: text
  regex: "\\{\\{[^}]*\\$\\w+"
---
id: vue-template-globals-attr
language: Html
severity: warning
message: "Vue template uses a `$`-prefixed identifier in a directive/binding value; bind it from <script setup> instead"
rule:
  kind: quoted_attribute_value
  regex: "\\$\\w+"
  inside:
    kind: attribute
    has:
      kind: attribute_name
      regex: "^([:@]|v-)"
