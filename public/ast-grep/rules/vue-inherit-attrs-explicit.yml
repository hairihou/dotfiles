id: vue-inherit-attrs-explicit
language: Html
severity: warning
files:
  - "*.vue"
message: "Vue SFC should declare `defineOptions({ inheritAttrs: false })` and forward attrs via `useAttrs()` + `v-bind` on the intended target"
rule:
  kind: script_element
  not:
    has:
      stopBy: end
      regex: "inheritAttrs\\s*:\\s*false"
