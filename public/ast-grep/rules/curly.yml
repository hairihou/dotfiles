id: curly-if-ts
language: TypeScript
rule:
  all:
    - pattern: if ($COND) $STMT
    - not:
        has:
          field: alternative
          pattern: $_
constraints:
  STMT:
    not:
      kind: statement_block
fix: "if ($COND) { $STMT }"
