[bootstrap.macos.defaults.NSGlobalDomain]
ApplePressAndHoldEnabled = false
AppleShowAllExtensions = true
"com.apple.sound.uiaudio.enabled" = 0
"com.apple.trackpad.scaling" = 3.0
InitialKeyRepeat = 15
KeyRepeat = 2
NSAutoFillHeuristicControllerEnabled = false

[bootstrap.macos.defaults."com.apple.AppleMultitouchTrackpad"]
ActuationStrength = 0

[bootstrap.macos.defaults."com.apple.dock"]
autohide = true
magnification = false
orientation = "left"
"show-recents" = false
tilesize = 48

[bootstrap.macos.defaults."com.apple.finder"]
FXRemoveOldTrashItems = true

[bootstrap.macos.defaults."com.apple.HIToolbox"]
AppleFnUsageType = 0

[bootstrap.macos.defaults."com.apple.screencapture"]
name = "ss"

[dotfiles]
"~/.claude/**" = { source = "~/dotfiles/src/.claude/**", mode = "symlink-each" }
"~/.config/**" = { source = "~/dotfiles/src/.config/**", mode = "symlink-each" }
"~/.npmrc" = { source = "~/dotfiles/src/.npmrc" }
"~/.zshrc" = { source = "~/dotfiles/src/.zshrc" }

[settings]
experimental = true
github.use_git_credentials = true
minimum_release_age_excludes = ["claude-code", "codex", "opencode"]

[tools]
ast-grep = "0.44.0"
aube = "1.25.2"
carapace = "1.7.3"
claude-code = "2.1.198"
codex = "0.142.5"
fzf = "0.73.1"
gh = "2.95.0"
ghq = "1.10.1"
go = "1.26.4"
neovim = "0.12.3"
node = "24.18.0"
"npm:@angular/cli" = "22.0.5"
"npm:@fission-ai/openspec" = "1.5.0"
"npm:@googleworkspace/cli" = "0.22.5"
"npm:@helpfeel/cosense-cli" = "1.5.2"
"npm:@ionic/cli" = "7.2.1"
"npm:@playwright/cli" = "0.1.15"
"npm:agent-browser" = "0.31.1"
"npm:ccusage" = "20.0.14"
ollama = "0.31.1"
opencode = "1.17.13"
"pipx:git+https://github.com/NousResearch/hermes-agent.git" = "v2026.7.1"
"pipx:git+https://github.com/github/spec-kit.git" = "v0.12.3"
pnpm = "11.9.0"
python = "3.14.6"
ripgrep = "15.1.0"
swiftlint = "0.65.0"
tmux = "3.6b"
tree-sitter = "0.26.10"
uv = "0.11.26"
xh = "0.26.1"
