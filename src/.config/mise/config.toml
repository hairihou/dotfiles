[bootstrap.macos.defaults.NSGlobalDomain]
ApplePressAndHoldEnabled = false
AppleShowAllExtensions = true
"com.apple.sound.uiaudio.enabled" = 0
"com.apple.trackpad.scaling" = 3.0
InitialKeyRepeat = 15
KeyRepeat = 2
NSAutoFillHeuristicControllerEnabled = false

[bootstrap.macos.defaults."com.apple.AppleMultitouchTrackpad"]
ActuationStrength = 0

[bootstrap.macos.defaults."com.apple.dock"]
autohide = true
magnification = false
orientation = "left"
"show-recents" = false
tilesize = 48

[bootstrap.macos.defaults."com.apple.finder"]
FXRemoveOldTrashItems = true

[bootstrap.macos.defaults."com.apple.HIToolbox"]
AppleFnUsageType = 0

[bootstrap.macos.defaults."com.apple.screencapture"]
name = "ss"

[dotfiles]
"~/.claude" = { source = "~/dotfiles/src/.claude", mode = "symlink-each" }
"~/.config" = { source = "~/dotfiles/src/.config", mode = "symlink-each" }
"~/.npmrc" = { source = "~/dotfiles/src/.npmrc" }
"~/.zshrc" = { source = "~/dotfiles/src/.zshrc" }

[settings]
github.use_git_credentials = true
minimum_release_age_excludes = ["claude-code", "codex", "opencode"]

[tasks.tmux-path]
description = "Sync tmux server PATH after mise bumps"
run = 'tmux set-environment -g PATH "$PATH"'

[tools]
ast-grep = "0.44.1"
aube = "1.29.0"
carapace = "1.7.3"
claude-code = "2.1.212"
codex = "0.144.5"
fzf = "0.74.0"
gh = "2.96.0"
ghq = "1.10.1"
go = "1.26.5"
neovim = "0.12.4"
node = "24.18.0"
"npm:@angular/cli" = "22.0.7"
"npm:@fission-ai/openspec" = "1.6.0"
"npm:@googleworkspace/cli" = "0.22.5"
"npm:@ionic/cli" = "7.2.1"
"npm:@playwright/cli" = "0.1.17"
"npm:agent-browser" = "0.32.1"
"npm:ccusage" = "20.0.17"
opencode = "1.18.3"
"pipx:git+https://github.com/NousResearch/hermes-agent.git" = "v2026.7.7"
"pipx:git+https://github.com/github/spec-kit.git" = "v0.12.17"
pnpm = "11.13.1"
python = "3.14.6"
ripgrep = "15.2.0"
swiftlint = "0.65.0"
tmux = "3.7b"
tree-sitter = "0.26.11"
uv = "0.11.29"
xh = "0.26.1"
