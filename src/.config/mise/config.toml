[bootstrap.macos.defaults.NSGlobalDomain]
ApplePressAndHoldEnabled = false
AppleShowAllExtensions = true
"com.apple.sound.uiaudio.enabled" = 0
"com.apple.trackpad.scaling" = 3.0
InitialKeyRepeat = 15
KeyRepeat = 2
NSAutoFillHeuristicControllerEnabled = false

[bootstrap.macos.defaults."com.apple.AppleMultitouchTrackpad"]
ActuationStrength = 0

[bootstrap.macos.defaults."com.apple.dock"]
autohide = true
magnification = false
orientation = "left"
"show-recents" = false
tilesize = 48

[bootstrap.macos.defaults."com.apple.finder"]
FXRemoveOldTrashItems = true

[bootstrap.macos.defaults."com.apple.HIToolbox"]
AppleFnUsageType = 0

[bootstrap.macos.defaults."com.apple.screencapture"]
name = "ss"

[dotfiles]
"~/.claude/**" = { source = "~/dotfiles/src/.claude/**", mode = "symlink-each" }
"~/.config/**" = { source = "~/dotfiles/src/.config/**", mode = "symlink-each" }
"~/.npmrc" = { source = "~/dotfiles/src/.npmrc" }
"~/.zshrc" = { source = "~/dotfiles/src/.zshrc" }

[settings]
experimental = true
minimum_release_age_excludes = ["claude-code", "codex", "opencode"]

[tools]
ast-grep = "0.44.0"
aube = "1.23.0"
carapace = "1.7.1"
claude-code = "2.1.186"
codex = "0.142.0"
fzf = "0.73.1"
gh = "2.95.0"
ghq = "1.10.1"
go = "1.26.4"
neovim = "0.12.3"
node = "24.17.0"
"npm:@angular/cli" = "22.0.3"
"npm:@fission-ai/openspec" = "1.4.1"
"npm:@googleworkspace/cli" = "0.22.5"
"npm:@helpfeel/cosense-cli" = "1.4.6"
"npm:@ionic/cli" = "7.2.1"
"npm:@playwright/cli" = "0.1.14"
"npm:agent-browser" = "0.29.1"
"npm:ccusage" = "20.0.14"
ollama = "0.30.10"
opencode = "1.17.9"
"pipx:git+https://github.com/NousResearch/hermes-agent.git" = "v2026.6.19"
"pipx:git+https://github.com/github/spec-kit.git" = "v0.11.3"
pnpm = "11.9.0"
python = "3.14.6"
ripgrep = "15.1.0"
swiftlint = "0.64.1"
tmux = "3.6b"
tree-sitter = "0.26.9"
uv = "0.11.23"
xh = "0.26.1"
